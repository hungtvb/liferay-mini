name: Article Importer Check

on:
  pull_request:
    paths:
      - tools/liferay-article-importer/**
      - .github/workflows/article-importer-check.yml
  push:
    branches:
      - feat/excel-web-content-importer
    paths:
      - tools/liferay-article-importer/**
      - .github/workflows/article-importer-check.yml

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/liferay-article-importer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm test
