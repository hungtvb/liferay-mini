name: Global Assets Check

on:
  pull_request:
    paths:
      - "client-extensions/nexcent-global-assets/**"
      - "client-extensions/nexcent-landing-elements/**"
      - ".github/workflows/global-assets-check.yml"
  push:
    branches:
      - main
    paths:
      - "client-extensions/nexcent-global-assets/**"
      - "client-extensions/nexcent-landing-elements/**"
      - ".github/workflows/global-assets-check.yml"

permissions:
  contents: read

jobs:
  validate-global-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Client Extension files
        run: |
          test -f client-extensions/nexcent-global-assets/client-extension.yaml
          test -f client-extensions/nexcent-global-assets/assets/global.css
          test -f client-extensions/nexcent-global-assets/assets/global.js

      - name: Verify Global CSS configuration
        run: |
          grep -q "type: globalCSS" client-extensions/nexcent-global-assets/client-extension.yaml
          grep -q "scope: company" client-extensions/nexcent-global-assets/client-extension.yaml
          grep -q -- "--nxc-color-primary" client-extensions/nexcent-global-assets/assets/global.css
          grep -q ".nxc-button" client-extensions/nexcent-global-assets/assets/global.css

      - name: Verify Global JavaScript configuration
        run: |
          grep -q "type: globalJS" client-extensions/nexcent-global-assets/client-extension.yaml
          grep -q "data-senna-track: permanent" client-extensions/nexcent-global-assets/client-extension.yaml
          grep -q "window.Nexcent" client-extensions/nexcent-global-assets/assets/global.js
          grep -q "getPortalContext" client-extensions/nexcent-global-assets/assets/global.js

      - name: Ensure component bundle does not redefine global tokens
        run: |
          if grep -R --line-number -- "--nxc-color-primary:" client-extensions/nexcent-landing-elements/src; then
            echo "Global tokens must be defined only in nexcent-global-assets."
            exit 1
          fi
