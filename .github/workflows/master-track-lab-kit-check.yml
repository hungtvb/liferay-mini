name: Master Track Lab Kit Check

on:
    pull_request:
        paths:
            - '.github/workflows/master-track-lab-kit-check.yml'
            - 'README.md'
            - 'scripts/verify-course.mjs'
            - 'client-extensions/nexcent-training-batch-lab/**'
            - 'docs/master-track/**'
            - 'modules/nexcent-training/**'
            - 'training/master-track-code-labs/**'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    validate-lab-kit:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout feature branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref_name }}

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Validate repository and lab contracts
              run: |
                  node scripts/verify-course.mjs
                  node training/master-track-code-labs/scripts/validate-lab-kit.mjs

            - name: Bootstrap Service Builder generated source once
              shell: bash
              run: |
                  set -euo pipefail

                  GENERATED_MODEL="modules/nexcent-training/nexcent-training-api/src/main/java/com/nexcent/training/model/ImportJobModel.java"

                  if [ -f "$GENERATED_MODEL" ]; then
                    echo "Service Builder generated source already exists."
                    exit 0
                  fi

                  LOG_FILE="${RUNNER_TEMP}/nexcent-build-service-bootstrap.log"

                  ./gradlew \
                    :modules:nexcent-training:nexcent-training-service:buildService \
                    --info --stacktrace > "$LOG_FILE" 2>&1 || true

                  python <<'PY'
                  from pathlib import Path
                  import re
                  import shutil

                  log_path = Path(__import__('os').environ['RUNNER_TEMP']) / 'nexcent-build-service-bootstrap.log'
                  log = log_path.read_text(errors='replace')
                  match = re.search(
                      r' Command: .*? -cp (.*?) com\.liferay\.portal\.tools\.service\.builder\.ServiceBuilder (.*)',
                      log,
                  )

                  if not match:
                      raise SystemExit('Could not extract the Service Builder runtime command.')

                  classpath, arguments = match.groups()
                  runtime = Path(__import__('os').environ['RUNNER_TEMP']) / 'nexcent-service-builder-runtime'
                  library = runtime / 'lib'
                  library.mkdir(parents=True, exist_ok=True)

                  for item in classpath.split(':'):
                      source = Path(item)

                      if source.is_file():
                          shutil.copy2(source, library / source.name)

                  (runtime / 'classpath.txt').write_text(classpath + '\n')
                  (runtime / 'arguments.txt').write_text(arguments + '\n')
                  PY

                  RUNTIME="${RUNNER_TEMP}/nexcent-service-builder-runtime"
                  JAVASSIST=$(find "$RUNTIME/lib" -name 'javassist-*.jar' -print -quit)

                  if [ -z "$JAVASSIST" ]; then
                    echo "Javassist was not found in the Service Builder runtime."
                    exit 1
                  fi

                  mkdir -p "$RUNTIME/patch-src" "$RUNTIME/patch-classes" "$RUNTIME/patched"

                  cat > "$RUNTIME/patch-src/PatchServiceBuilder.java" <<'JAVA'
                  import javassist.ClassPool;
                  import javassist.CtClass;
                  import javassist.CtMethod;

                  public class PatchServiceBuilder {
                      public static void main(String[] args) throws Exception {
                          ClassPool pool = new ClassPool(false);
                          pool.appendSystemPath();

                          java.io.File libDirectory = new java.io.File(args[0]);

                          for (java.io.File file : libDirectory.listFiles()) {
                              if (file.getName().endsWith(".jar")) {
                                  pool.insertClassPath(file.getAbsolutePath());
                              }
                          }

                          CtClass clazz = pool.get(
                              "com.liferay.portal.tools.service.builder.ServiceBuilder");

                          CtMethod getJavaClass = clazz.getDeclaredMethod(
                              "_getJavaClass",
                              new CtClass[] {pool.get("java.lang.String")});

                          getJavaClass.insertBefore(
                              "{" +
                              "String __fileName = _normalize($1);" +
                              "int __pos = 0;" +
                              "if (__fileName.startsWith(this._implDirName)) { __pos = this._implDirName.length() + 1; }" +
                              "else if (__fileName.startsWith(this._apiDirName)) { __pos = this._apiDirName.length() + 1; }" +
                              "else { __pos = -1; }" +
                              "if (__pos >= 0) {" +
                              "String __fqcn = com.liferay.portal.kernel.util.StringUtil.replace(__fileName.substring(__pos, __fileName.length() - 5), '/', '.');" +
                              "java.util.Iterator __iterator = this._pendingWrites.iterator();" +
                              "Object[] __match = null;" +
                              "while (__iterator.hasNext()) {" +
                              "Object[] __candidate = (Object[])__iterator.next();" +
                              "java.io.File __pendingFile = (java.io.File)__candidate[0];" +
                              "if (_normalize(__pendingFile.toString()).equals(__fileName)) { __match = __candidate; }" +
                              "}" +
                              "if (__match != null) {" +
                              "String __content = (String)__match[2];" +
                              "com.thoughtworks.qdox.library.ClassLibraryBuilder __library = new com.thoughtworks.qdox.library.SortedClassLibraryBuilder();" +
                              "__library.appendClassLoader(this.getClass().getClassLoader());" +
                              "com.thoughtworks.qdox.JavaProjectBuilder __project = new com.thoughtworks.qdox.JavaProjectBuilder(__library);" +
                              "__project.addSource(new java.io.StringReader(__content));" +
                              "com.thoughtworks.qdox.model.JavaClass __javaClass = __project.getClassByName(__fqcn);" +
                              "this._javaClasses.put(__fqcn, __javaClass);" +
                              "return __javaClass;" +
                              "}" +
                              "}" +
                              "}"
                          );

                          CtMethod readFile = clazz.getDeclaredMethod(
                              "_read", new CtClass[] {pool.get("java.io.File")});

                          readFile.insertBefore(
                              "{" +
                              "String __requested = _normalize($1.toString());" +
                              "java.util.Iterator __iterator = this._pendingWrites.iterator();" +
                              "Object[] __match = null;" +
                              "while (__iterator.hasNext()) {" +
                              "Object[] __candidate = (Object[])__iterator.next();" +
                              "java.io.File __pendingFile = (java.io.File)__candidate[0];" +
                              "if (_normalize(__pendingFile.toString()).equals(__requested)) { __match = __candidate; }" +
                              "}" +
                              "if (__match != null) { return (String)__match[2]; }" +
                              "}"
                          );

                          clazz.writeFile(args[1]);
                      }
                  }
                  JAVA

                  javac \
                    -cp "$JAVASSIST" \
                    -d "$RUNTIME/patch-classes" \
                    "$RUNTIME/patch-src/PatchServiceBuilder.java"

                  java \
                    -cp "$RUNTIME/patch-classes:$JAVASSIST" \
                    PatchServiceBuilder "$RUNTIME/lib" "$RUNTIME/patched"

                  CLASSPATH=$(cat "$RUNTIME/classpath.txt")
                  ARGUMENTS=$(cat "$RUNTIME/arguments.txt")

                  (
                    cd modules/nexcent-training/nexcent-training-service
                    java \
                      -cp "$RUNTIME/patched:$CLASSPATH" \
                      com.liferay.portal.tools.service.builder.ServiceBuilder \
                      $ARGUMENTS
                  )

                  cp \
                    training/master-track-code-labs/application/service-builder/ImportJobLocalServiceImpl.java \
                    modules/nexcent-training/nexcent-training-service/src/main/java/com/nexcent/training/service/impl/ImportJobLocalServiceImpl.java

                  ./gradlew \
                    :modules:nexcent-training:nexcent-training-service:buildService \
                    --stacktrace

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add \
                    modules/nexcent-training/nexcent-training-api/src \
                    modules/nexcent-training/nexcent-training-service/src
                  git commit -m "feat(service-builder): commit generated ImportJob services"
                  git push origin "HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

            - name: Build OSGi component lab
              run: ./gradlew :modules:nexcent-training:nexcent-training-osgi:build

            - name: Verify Service Builder regeneration
              run: ./gradlew :modules:nexcent-training:nexcent-training-service:buildService

            - name: Generate REST Builder source
              run: ./gradlew :modules:nexcent-training:nexcent-training-rest-impl:buildREST

            - name: Build application modules
              run: |
                  ./gradlew \
                    :modules:nexcent-training:nexcent-training-api:build \
                    :modules:nexcent-training:nexcent-training-service:build \
                    :modules:nexcent-training:nexcent-training-rest-api:build \
                    :modules:nexcent-training:nexcent-training-rest-impl:build

            - name: Build Batch Client Extension lab
              working-directory: client-extensions/nexcent-training-batch-lab
              run: ../../gradlew build
