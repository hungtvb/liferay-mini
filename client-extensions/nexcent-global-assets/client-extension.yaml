assemble:
    - from: assets
      hashify: global.css
      into: static
    - from: assets
      hashify: global.js
      into: static

nexcent-global-css:
    name: Nexcent Global CSS
    scope: company
    type: globalCSS
    url: global.*.css

nexcent-global-js:
    name: Nexcent Global JavaScript
    scope: company
    scriptElementAttributes:
        data-senna-track: permanent
    scriptLocation: head
    type: globalJS
    url: global.*.js
