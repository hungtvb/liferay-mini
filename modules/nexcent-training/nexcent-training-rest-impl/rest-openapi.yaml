components:
    schemas:
        ImportJob:
            properties:
                errorMessage:
                    type: string
                externalReferenceCode:
                    type: string
                failedRows:
                    format: int32
                    type: integer
                fileName:
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                status:
                    readOnly: true
                    type: string
                successRows:
                    format: int32
                    readOnly: true
                    type: integer
                totalRows:
                    format: int32
                    type: integer
            required:
                - externalReferenceCode
                - fileName
                - totalRows
            type: object
info:
    description: "Training API for creating and reading Nexcent import jobs."
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "Nexcent Training"
    version: v1.0
openapi: 3.0.1
paths:
    "/sites/{siteId}/import-jobs":
        post:
            operationId: postSiteImportJob
            parameters:
                - in: path
                  name: siteId
                  required: true
                  schema:
                      format: int64
                      type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ImportJob"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/ImportJob"
                required: true
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ImportJob"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ImportJob"
                    description: "Import job created or reset by ERC."
            tags: ["ImportJob"]
    "/sites/{siteId}/import-jobs/{externalReferenceCode}":
        get:
            operationId: getSiteImportJob
            parameters:
                - in: path
                  name: siteId
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: path
                  name: externalReferenceCode
                  required: true
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ImportJob"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ImportJob"
                    description: "Import job matching the site and ERC."
            tags: ["ImportJob"]
