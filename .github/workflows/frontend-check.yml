name: Frontend Check

on:
  pull_request:
    paths:
      - "client-extensions/nexcent-landing-elements/**"
      - ".github/workflows/frontend-check.yml"
  push:
    branches:
      - main
    paths:
      - "client-extensions/nexcent-landing-elements/**"
      - ".github/workflows/frontend-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client-extensions/nexcent-landing-elements

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Capture TypeScript diagnostics
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: importer-typecheck-diagnostics
          path: client-extensions/nexcent-landing-elements/typecheck.log
          if-no-files-found: error

      - name: Build Client Extension
        run: npm run build

      - name: Verify deterministic output
        run: |
          test -f build/index.js
          test -f build/style.css

      - name: Enforce successful TypeScript check
        if: always()
        run: test "${{ steps.typecheck.outputs.status }}" = "0"
