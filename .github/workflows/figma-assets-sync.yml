name: Sync Figma Assets

on:
  workflow_dispatch:
    inputs:
      root_node:
        description: Figma frame/node ID to scan
        required: true
        default: "1:2"
      prune:
        description: Remove stale files managed by the sync directory
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: figma-assets-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Export assets from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_ROOT_NODE: ${{ inputs.root_node }}
          FIGMA_PRUNE: ${{ inputs.prune }}
        run: node scripts/figma-sync.mjs

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain -- prototypes/nexcent-static/assets/figma)" ]]; then
            echo "No Figma asset changes detected."
            exit 0
          fi

          branch="chore/figma-assets-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add prototypes/nexcent-static/assets/figma
          git commit -m "chore: sync assets from Figma"
          git push --set-upstream origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: sync assets from Figma" \
            --body $'## Summary\n- exports tagged/export-enabled assets from the configured Figma frame\n- updates the generated asset manifest\n- removes stale managed assets when pruning is enabled\n\n## Verification\n- generated by the **Sync Figma Assets** workflow\n- review the Vercel preview before merging'
