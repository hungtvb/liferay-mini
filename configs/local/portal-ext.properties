# Local-only defaults for the Nexcent training bundle.
# This file is overlaid into LIFERAY_HOME by the local workspace environment.

##
## Company and setup
##

browser.launcher.url=
company.default.name=Nexcent
company.default.web.id=nexcent.com
company.security.auth.type=emailAddress
company.security.strangers.verify=false
setup.wizard.enabled=false
terms.of.use.required=false
virtual.hosts.valid.hosts=*

##
## Default administrator
##

# The effective login email is:
# default.admin.email.address.prefix + @ + company.default.web.id
# => admin@nexcent.com

default.admin.email.address.prefix=admin
default.admin.first.name=Nexcent
default.admin.last.name=Admin
default.admin.password=learn
default.admin.screen.name=nexcentadmin

##
## Lab-friendly user behavior
##

passwords.default.policy.change.required=false
users.reminder.queries.custom.question.enabled=false
users.reminder.queries.enabled=false

# Do not auto-create personal sites and pages for each lab user.
layout.user.private.layouts.auto.create=false
layout.user.private.layouts.enabled=false
layout.user.public.layouts.auto.create=false
layout.user.public.layouts.enabled=false

# Development conveniences only. Do not reuse this local profile for production.
include-and-override=portal-developer.properties
