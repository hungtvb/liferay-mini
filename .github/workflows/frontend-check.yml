name: Frontend Check

on:
  pull_request:
    paths:
      - "client-extensions/nexcent-landing-elements/**"
      - "client-extensions/nexcent-theme/**"
      - "sample-data/json/**"
      - "sample-data/excel/**"
      - ".github/workflows/frontend-check.yml"
  push:
    branches:
      - main
    paths:
      - "client-extensions/nexcent-landing-elements/**"
      - "client-extensions/nexcent-theme/**"
      - "sample-data/json/**"
      - "sample-data/excel/**"
      - ".github/workflows/frontend-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client-extensions/nexcent-landing-elements

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test importer validation
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Build React Client Extension
        run: npm run build

      - name: Package Nexcent Fragment Set
        run: npm run package:fragments

      - name: Verify deterministic frontend output
        run: |
          test -f build/index.js
          test -f build/style.css
          test -s build/fragments/collections-nexcent-components.zip
          jar --list --file build/fragments/collections-nexcent-components.zip | grep -q 'nexcent-components/collection.json'
          jar --list --file build/fragments/collections-nexcent-components.zip | grep -q 'nexcent-components/fragments/nexcent-react-header/configuration.json'
          jar --list --file build/fragments/collections-nexcent-components.zip | grep -q 'nexcent-components/fragments/nexcent-react-footer/configuration.json'

      - name: Build Nexcent Theme Client Extension
        working-directory: client-extensions/nexcent-theme
        run: ../../gradlew build

      - name: Verify theme output
        working-directory: client-extensions/nexcent-theme
        run: |
          test -f assets/global-entry.css
          test -f assets/react-shell.css
          grep -q 'url: global-entry.css' client-extension.yaml
          grep -q './global.css' assets/global-entry.css
          grep -q './react-shell.css' assets/global-entry.css

      - name: Generate sample workbook
        run: npm run generate:workbook

      - name: Verify generated workbook
        run: |
          test -s ../../sample-data/excel/nexcent-content.xlsx
          node -e "import('exceljs').then(async ({default: ExcelJS}) => { const workbook = new ExcelJS.Workbook(); await workbook.xlsx.readFile('../../sample-data/excel/nexcent-content.xlsx'); const names = workbook.worksheets.map((sheet) => sheet.name); const required = ['Instructions', 'Heroes', 'ClientsIntro', 'Clients', 'ServicesIntro', 'Services', 'Features', 'StatisticsIntro', 'Statistics', 'Testimonials', 'CommunityIntro', 'CommunityCards', 'CTA']; if (required.some((name) => !names.includes(name))) process.exit(1); })"
