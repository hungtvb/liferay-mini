name: Port Nexcent Reference

on:
  push:
    branches:
      - port/nexcent-reference
    paths:
      - .github/workflows/port-nexcent-reference.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: port-nexcent-reference
  cancel-in-progress: false

jobs:
  port:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import pinned Nexcent source
        run: bash scripts/port-nexcent-reference.sh

      - name: Verify imported page
        run: |
          set -euo pipefail
          test -f prototypes/nexcent-static/index.html
          test -f prototypes/nexcent-static/css/style.css
          test -f prototypes/nexcent-static/js/script.js
          test -f prototypes/nexcent-static/icons/logo.svg
          test -f prototypes/nexcent-static/img/image-1.png
          grep -q 'class="btn btn-light">Login</a>' prototypes/nexcent-static/index.html
          grep -q 'class="btn">Sign up</a>' prototypes/nexcent-static/index.html

      - name: Commit imported source and open review PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain -- prototypes/nexcent-static)" ]]; then
            echo "No port changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prototypes/nexcent-static
          git commit -m "feat: port Nexcent reference frontend"
          git push origin HEAD:port/nexcent-reference

          existing_pr="$(gh pr list --head port/nexcent-reference --base main --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            echo "PR #$existing_pr already exists."
            exit 0
          fi

          gh pr create \
            --base main \
            --head port/nexcent-reference \
            --title "feat: port Nexcent reference frontend" \
            --body $'## Summary\n- ports the public Nexcent reference page from `StepanovVVV/Nexcent` at pinned commit `7d6c7dbc57be24febeca0e18fabdd35278809039`\n- imports the original HTML, CSS, JavaScript, images, icons, and favicon into `prototypes/nexcent-static`\n- preserves the original header actions, including **Login** and **Sign up**\n- keeps the existing Liferay/Headless integration files in place but makes the imported reference page the active visual baseline\n\n## Verification\n- all local `src`/`href` references in the imported HTML resolve\n- required visual files exist\n- Login and Sign up header actions are present\n- review the Vercel Preview against https://stepanovvvv.github.io/Nexcent/ before merging\n\n## Follow-up\nAfter visual acceptance, reconnect the existing mock/headless adapters section by section without changing the accepted output.'
