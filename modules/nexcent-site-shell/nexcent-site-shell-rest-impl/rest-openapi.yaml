components:
    schemas:
        AccountContext:
            properties:
                accountURL:
                    type: string
                createAccountURL:
                    type: string
                displayName:
                    type: string
                emailAddress:
                    type: string
                loginURL:
                    type: string
                logoutURL:
                    type: string
                portraitURL:
                    type: string
                signedIn:
                    type: boolean
            type: object
        NavigationItem:
            properties:
                children:
                    items:
                        $ref: "#/components/schemas/NavigationItem"
                    type: array
                externalReferenceCode:
                    type: string
                label:
                    type: string
                selected:
                    type: boolean
                target:
                    type: string
                url:
                    type: string
            type: object
        SiteIdentity:
            properties:
                externalReferenceCode:
                    type: string
                homeURL:
                    type: string
                logoURL:
                    type: string
                name:
                    type: string
                siteId:
                    format: int64
                    type: integer
            type: object
        SiteShell:
            properties:
                account:
                    $ref: "#/components/schemas/AccountContext"
                companyNavigation:
                    items:
                        $ref: "#/components/schemas/NavigationItem"
                    type: array
                headerNavigation:
                    items:
                        $ref: "#/components/schemas/NavigationItem"
                    type: array
                site:
                    $ref: "#/components/schemas/SiteIdentity"
                supportNavigation:
                    items:
                        $ref: "#/components/schemas/NavigationItem"
                    type: array
                warnings:
                    items:
                        type: string
                    type: array
            type: object
info:
    description: "Read-only site shell API for the Nexcent React Header and Footer."
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "Nexcent Site Shell"
    version: v1.0
openapi: 3.0.1
paths:
    "/sites/{siteId}/site-shell":
        get:
            operationId: getSiteSiteShell
            parameters:
                - in: path
                  name: siteId
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SiteShell"
                    description: "Site navigation, identity, and account context."
            tags: ["SiteShell"]
