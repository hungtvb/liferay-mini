# Triggered once to refactor production fallback dependencies.
name: One-shot Prototype Dependency Refactor

on:
    pull_request:
        paths:
            - .github/workflows/refactor-prototype-dependency.yml

permissions:
    contents: write

jobs:
    refactor:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Check out branch
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Isolate fallback content and assets
              run: |
                  set -euo pipefail

                  root="$GITHUB_WORKSPACE"
                  extension="$root/client-extensions/nexcent-landing-elements"
                  fallback="$extension/src/static-site/fallback"
                  prototype="$root/prototypes/nexcent-static"

                  mkdir -p "$fallback/assets"
                  cp "$prototype/content.json" "$fallback/content.json"
                  rm -rf "$fallback/assets/css" "$fallback/assets/icons" "$fallback/assets/img"
                  cp -R "$prototype/css" "$fallback/assets/css"
                  cp -R "$prototype/icons" "$fallback/assets/icons"
                  cp -R "$prototype/img" "$fallback/assets/img"

                  node <<'NODE'
                  const {readdirSync, readFileSync, writeFileSync} = require('node:fs');
                  const path = require('node:path');

                  const root = process.env.GITHUB_WORKSPACE;
                  const extension = path.join(
                      root,
                      'client-extensions/nexcent-landing-elements'
                  );
                  const sourceRoot = path.join(extension, 'src');
                  const fallbackRoot = path.join(sourceRoot, 'static-site/fallback');

                  function modulePath(fromFile, targetPath) {
                      const relative = path
                          .relative(path.dirname(fromFile), targetPath)
                          .split(path.sep)
                          .join('/');

                      return relative.startsWith('.') ? relative : `./${relative}`;
                  }

                  function sourceFiles(directory) {
                      return readdirSync(directory, {withFileTypes: true}).flatMap(
                          (entry) => {
                              const absolutePath = path.join(directory, entry.name);

                              if (entry.isDirectory()) {
                                  return sourceFiles(absolutePath);
                              }

                              return /\.(?:js|jsx|ts|tsx)$/.test(entry.name)
                                  ? [absolutePath]
                                  : [];
                          }
                      );
                  }

                  for (const filePath of sourceFiles(sourceRoot)) {
                      const source = readFileSync(filePath, 'utf8');
                      const fallbackContent = modulePath(
                          filePath,
                          path.join(fallbackRoot, 'content.json')
                      );
                      const fallbackCss = modulePath(
                          filePath,
                          path.join(fallbackRoot, 'assets/css/style.css')
                      );
                      const updated = source
                          .replace(
                              /(?:\.\.\/)+prototypes\/nexcent-static\/content\.json/g,
                              fallbackContent
                          )
                          .replace(
                              /(?:\.\.\/)+prototypes\/nexcent-static\/css\/style\.css\?inline/g,
                              `${fallbackCss}?inline`
                          )
                          .replace(
                              /(?:\.\.\/)+prototypes\/nexcent-static\/(icons|img)\/([^'";]+)/g,
                              (_match, directory, relativeAsset) =>
                                  modulePath(
                                      filePath,
                                      path.join(
                                          fallbackRoot,
                                          'assets',
                                          directory,
                                          relativeAsset
                                      )
                                  )
                          );

                      if (updated !== source) {
                          writeFileSync(filePath, updated);
                      }
                  }
                  NODE

            - name: Add production-source dependency guard
              run: |
                  cat > client-extensions/nexcent-landing-elements/scripts/validate-no-prototype-imports.mjs <<'EOF'
                  import {readdir, readFile} from 'node:fs/promises';
                  import path from 'node:path';
                  import {fileURLToPath} from 'node:url';

                  const projectRoot = path.resolve(
                      path.dirname(fileURLToPath(import.meta.url)),
                      '..'
                  );
                  const sourceRoot = path.join(projectRoot, 'src');
                  const supportedExtensions = /\.(?:js|jsx|ts|tsx)$/;

                  async function collectSourceFiles(directory) {
                      const entries = await readdir(directory, {withFileTypes: true});
                      const files = [];

                      for (const entry of entries) {
                          const absolutePath = path.join(directory, entry.name);

                          if (entry.isDirectory()) {
                              files.push(...(await collectSourceFiles(absolutePath)));
                          }
                          else if (supportedExtensions.test(entry.name)) {
                              files.push(absolutePath);
                          }
                      }

                      return files;
                  }

                  const violations = [];

                  for (const sourceFile of await collectSourceFiles(sourceRoot)) {
                      const source = await readFile(sourceFile, 'utf8');

                      if (source.includes('prototypes/nexcent-static')) {
                          violations.push(path.relative(projectRoot, sourceFile));
                      }
                  }

                  if (violations.length) {
                      throw new Error(
                          `Production source must not import the static prototype:\n${violations.join('\n')}`
                      );
                  }

                  console.log('Production source is isolated from prototypes/nexcent-static.');
                  EOF

                  node <<'NODE'
                  const {readFileSync, writeFileSync} = require('node:fs');
                  const packagePath = 'client-extensions/nexcent-landing-elements/package.json';
                  const packageJson = JSON.parse(readFileSync(packagePath, 'utf8'));
                  const guardCommand = 'node scripts/validate-no-prototype-imports.mjs';
                  const currentCommand = packageJson.scripts['validate:data-sources'];

                  if (!currentCommand.includes(guardCommand)) {
                      packageJson.scripts['validate:data-sources'] =
                          `${currentCommand} && ${guardCommand}`;
                  }

                  writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 4)}\n`);
                  NODE

            - name: Install dependencies
              working-directory: client-extensions/nexcent-landing-elements
              run: npm ci --no-audit --no-fund

            - name: Validate existing data-source contracts
              working-directory: client-extensions/nexcent-landing-elements
              run: node scripts/validate-data-sources.mjs

            - name: Validate prototype isolation
              working-directory: client-extensions/nexcent-landing-elements
              run: node scripts/validate-no-prototype-imports.mjs

            - name: Run frontend tests
              working-directory: client-extensions/nexcent-landing-elements
              run: npm test

            - name: Build React Client Extension
              working-directory: client-extensions/nexcent-landing-elements
              run: npm run build 2>&1 | tee /tmp/refactor-build.log

            - name: Upload build diagnostics
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: prototype-refactor-build-log
                  path: /tmp/refactor-build.log
                  if-no-files-found: error
                  retention-days: 1

            - name: Record existing typecheck state
              continue-on-error: true
              working-directory: client-extensions/nexcent-landing-elements
              run: npm run typecheck

            - name: Commit refactor
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add client-extensions/nexcent-landing-elements

                  if git diff --cached --quiet; then
                      echo "No refactor changes detected."
                      exit 0
                  fi

                  git commit -m "refactor(frontend): isolate fallback assets from prototype"
                  git push origin "HEAD:${GITHUB_HEAD_REF}"
