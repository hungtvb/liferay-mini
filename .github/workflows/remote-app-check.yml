name: Remote App Check

on:
  pull_request:
    paths:
      - "remote-apps/nexcent-articles/**"
      - "client-extensions/nexcent-articles-client-extension/**"
      - "scripts/assemble-vercel-output.mjs"
      - "vercel.json"
      - "docs/course/08-remote-app.md"
      - "scripts/verify-course.mjs"
      - ".github/workflows/articles-check.yml"
  push:
    branches:
      - main
      - final
    paths:
      - "remote-apps/nexcent-articles/**"
      - "client-extensions/nexcent-articles-client-extension/**"
      - "scripts/assemble-vercel-output.mjs"
      - "vercel.json"
      - "docs/course/08-remote-app.md"
      - "scripts/verify-course.mjs"
      - ".github/workflows/articles-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-remote-app:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: remote-apps/nexcent-articles

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build external assets
        run: npm run build

      - name: Verify deterministic output
        run: |
          test -f dist/index.js
          test -f dist/style.css
          test -f dist/index.html

      - name: Verify Liferay registration
        working-directory: .
        run: |
          grep -q "baseURL: https://nexcent-liferay-static.vercel.app/articles" client-extensions/nexcent-articles-client-extension/client-extension.yaml
          grep -q "htmlElementName: nexcent-articles" client-extensions/nexcent-articles-client-extension/client-extension.yaml
          grep -q "type: customElement" client-extensions/nexcent-articles-client-extension/client-extension.yaml
          node scripts/verify-course.mjs

      - name: Verify combined Vercel output
        working-directory: .
        run: |
          node scripts/assemble-vercel-output.mjs
          test -f .vercel-static/index.html
          test -f .vercel-static/articles/index.html
          test -f .vercel-static/articles/index.js
          test -f .vercel-static/articles/style.css
