name: Master Track Lab Kit Check

on:
    pull_request:
        paths:
            - '.github/workflows/master-track-lab-kit-check.yml'
            - 'modules/nexcent-training/**'
            - 'remote-apps/nexcent-articles/**'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    validate-lab-kit:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout branch
              uses: actions/checkout@v4
              with:
                  ref: feat/article-content-pipeline
                  fetch-depth: 0

            - name: Apply remaining reviewed fixes
              run: python3 modules/nexcent-training/review-fix-driver.py

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Generate deterministic lockfiles
              run: |
                  npm install --package-lock-only --ignore-scripts --prefix modules/nexcent-training/nexcent-training-web
                  npm install --package-lock-only --ignore-scripts --prefix remote-apps/nexcent-articles

            - name: Build Article Custom Element
              working-directory: remote-apps/nexcent-articles
              run: |
                  npm install
                  npm run build

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Verify importer and admin module
              run: |
                  ./gradlew \
                    :modules:nexcent-training:nexcent-training-article-importer:test \
                    :modules:nexcent-training:nexcent-training-web:build \
                    --stacktrace

            - name: Commit validated source fixes
              run: |
                  git diff --check
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add \
                    modules/nexcent-training/nexcent-training-article-importer/src/main/java/com/nexcent/training/article/importer/internal/ArticleImportManagerImpl.java \
                    modules/nexcent-training/nexcent-training-web/src/main/resources/META-INF/resources/js/index.js \
                    modules/nexcent-training/nexcent-training-web/package.json \
                    modules/nexcent-training/nexcent-training-web/package-lock.json \
                    remote-apps/nexcent-articles/src/index.tsx \
                    remote-apps/nexcent-articles/package-lock.json
                  git commit -m "fix(content): complete PR 28 review fixes"
                  git push origin HEAD:feat/article-content-pipeline
