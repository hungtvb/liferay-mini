name: Master Track Lab Kit Check

on:
    pull_request:
        paths:
            - '.github/workflows/master-track-lab-kit-check.yml'
            - 'README.md'
            - 'scripts/verify-course.mjs'
            - 'client-extensions/nexcent-training-batch-lab/**'
            - 'docs/master-track/**'
            - 'modules/nexcent-training/**'
            - 'training/master-track-code-labs/**'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    validate-lab-kit:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Create diagnostics directory
              run: mkdir -p diagnostics

            - name: Validate repository and lab contracts
              run: |
                  set +e
                  node scripts/verify-course.mjs > diagnostics/course-contract.log 2>&1
                  echo $? > diagnostics/course-contract.exit
                  node training/master-track-code-labs/scripts/validate-lab-kit.mjs > diagnostics/lab-data-contract.log 2>&1
                  echo $? > diagnostics/lab-data-contract.exit
                  exit 0

            - name: Build OSGi component lab
              run: |
                  set +e
                  ./gradlew :modules:nexcent-training:nexcent-training-osgi:build --stacktrace > diagnostics/osgi-build.log 2>&1
                  echo $? > diagnostics/osgi-build.exit
                  exit 0

            - name: Generate and extend Service Builder source
              run: |
                  set +e

                  ./gradlew :modules:nexcent-training:nexcent-training-service:buildService --stacktrace > diagnostics/build-service.log 2>&1
                  code=$?

                  if [ "$code" -eq 0 ]; then
                    cp \
                      training/master-track-code-labs/application/service-builder/ImportJobLocalServiceImpl.java \
                      modules/nexcent-training/nexcent-training-service/src/main/java/com/nexcent/training/service/impl/ImportJobLocalServiceImpl.java

                    ./gradlew :modules:nexcent-training:nexcent-training-service:buildService --stacktrace >> diagnostics/build-service.log 2>&1
                    code=$?
                  fi

                  echo "$code" > diagnostics/build-service.exit
                  exit 0

            - name: Generate REST Builder source
              run: |
                  set +e
                  ./gradlew :modules:nexcent-training:nexcent-training-rest-impl:buildREST --stacktrace > diagnostics/build-rest.log 2>&1
                  echo $? > diagnostics/build-rest.exit
                  exit 0

            - name: Build application modules
              run: |
                  set +e
                  ./gradlew \
                    :modules:nexcent-training:nexcent-training-api:build \
                    :modules:nexcent-training:nexcent-training-service:build \
                    :modules:nexcent-training:nexcent-training-rest-api:build \
                    :modules:nexcent-training:nexcent-training-rest-impl:build \
                    --stacktrace > diagnostics/application-build.log 2>&1
                  echo $? > diagnostics/application-build.exit
                  exit 0

            - name: Build Batch Client Extension lab
              run: |
                  set +e
                  (
                    cd client-extensions/nexcent-training-batch-lab
                    ../../gradlew build --stacktrace
                  ) > diagnostics/batch-build.log 2>&1
                  echo $? > diagnostics/batch-build.exit
                  exit 0

            - name: Upload complete diagnostics
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: master-track-lab-diagnostics
                  path: diagnostics
                  if-no-files-found: error

            - name: Report diagnostic summary
              if: always()
              run: |
                  failed=0

                  for status in diagnostics/*.exit; do
                    name=$(basename "$status" .exit)
                    code=$(cat "$status")
                    echo "$name: exit $code"

                    if [ "$code" -ne 0 ]; then
                      failed=1
                    fi
                  done

                  if [ "$failed" -ne 0 ]; then
                    echo "One or more checks failed. Download master-track-lab-diagnostics for complete logs."
                    exit 1
                  fi
