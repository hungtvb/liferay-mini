assemble:
    - from: build
      into: static

nexcent-lab-status:
    cssURLs:
        - style.css
    friendlyURLMapping: nexcent-lab-status
    htmlElementName: nexcent-lab-status
    instanceable: false
    name: Nexcent Lab Status
    portletCategoryName: category.client-extensions
    type: customElement
    urls:
        - index.js
    useESM: true

nexcent-hero:
    cssURLs:
        - style.css
    friendlyURLMapping: nexcent-hero
    htmlElementName: nexcent-hero
    instanceable: false
    name: Nexcent Hero
    portletCategoryName: category.client-extensions
    properties:
        - "structure-identifier=NXC Landing Hero"
    type: customElement
    urls:
        - index.js
    useESM: true

nexcent-services:
    cssURLs:
        - style.css
    friendlyURLMapping: nexcent-services
    htmlElementName: nexcent-services
    instanceable: false
    name: Nexcent Services
    portletCategoryName: category.client-extensions
    properties:
        - "intro-structure-identifier=NXC Services Intro"
        - "item-structure-identifier=NXC Service Item"
    type: customElement
    urls:
        - index.js
    useESM: true

nexcent-features:
    cssURLs:
        - style.css
    friendlyURLMapping: nexcent-features
    htmlElementName: nexcent-features
    instanceable: false
    name: Nexcent Features
    portletCategoryName: category.client-extensions
    properties:
        - "structure-identifier=NXC Feature Item"
    type: customElement
    urls:
        - index.js
    useESM: true
