name: Master Track Lab Kit Check

on:
    pull_request:
        paths:
            - '.github/workflows/master-track-lab-kit-check.yml'
            - 'README.md'
            - 'scripts/verify-course.mjs'
            - 'client-extensions/nexcent-training-batch-lab/**'
            - 'docs/master-track/**'
            - 'modules/nexcent-training/**'
            - 'training/master-track-code-labs/**'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    validate-lab-kit:
        runs-on: ubuntu-latest
        timeout-minutes: 45

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Apply reviewed fixes in runner
              run: python3 modules/nexcent-training/review-fix-driver.py

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Generate admin package lock
              working-directory: modules/nexcent-training/nexcent-training-web
              run: npm install --package-lock-only --ignore-scripts

            - name: Snapshot reviewed fixes
              run: |
                  git config user.name "review-fix-runner"
                  git config user.email "review-fix-runner@noreply.local"
                  git add -A
                  git commit -m "test: snapshot PR 28 review fixes"

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Create diagnostics directory
              run: mkdir -p diagnostics

            - name: Validate repository and lab contracts
              run: |
                  node scripts/verify-course.mjs
                  node training/master-track-code-labs/scripts/validate-lab-kit.mjs

            - name: Build OSGi component lab
              run: ./gradlew :modules:nexcent-training:nexcent-training-osgi:build

            - name: Verify Service Builder regeneration
              run: ./gradlew :modules:nexcent-training:nexcent-training-service:buildService

            - name: Generate REST Builder source
              run: ./gradlew :modules:nexcent-training:nexcent-training-rest-impl:buildREST

            - name: Capture generated source changes
              run: |
                  git add -N modules/nexcent-training
                  git diff --binary > diagnostics/generated-sources.patch

            - name: Verify generated sources are checked in
              run: |
                  if [ -s diagnostics/generated-sources.patch ]; then
                    cat diagnostics/generated-sources.patch
                    echo "Generated Service Builder or REST Builder sources are stale."
                    exit 1
                  fi

            - name: Verify content import upgrade chain
              run: |
                  grep -q "drop index IX_NXC_IJI_JR on NXC_ImportJobItem" modules/nexcent-training/nexcent-training-service/src/main/java/com/nexcent/training/internal/upgrade/ContentImportUpgradeProcess.java
                  ! grep -q "drop index IX_B5D8A8BB on NXC_ImportJobItem" modules/nexcent-training/nexcent-training-service/src/main/java/com/nexcent/training/internal/upgrade/ContentImportUpgradeProcess.java

            - name: Test Article importer
              run: ./gradlew :modules:nexcent-training:nexcent-training-article-importer:test

            - name: Build application modules
              run: |
                  ./gradlew \
                    :modules:nexcent-training:nexcent-training-api:build \
                    :modules:nexcent-training:nexcent-training-service:build \
                    :modules:nexcent-training:nexcent-training-article-importer:build \
                    :modules:nexcent-training:nexcent-training-rest-api:build \
                    :modules:nexcent-training:nexcent-training-rest-impl:build \
                    :modules:nexcent-training:nexcent-training-web:build \
                    --stacktrace | tee diagnostics/application-build.log

            - name: Build Article Custom Element
              working-directory: remote-apps/nexcent-articles
              run: |
                  set -o pipefail
                  npm install --package-lock-only --ignore-scripts 2>&1 | tee ../../diagnostics/article-custom-element-build.log
                  npm ci 2>&1 | tee -a ../../diagnostics/article-custom-element-build.log
                  npm run build 2>&1 | tee -a ../../diagnostics/article-custom-element-build.log

            - name: Build Batch Client Extension lab
              run: |
                  (
                    cd client-extensions/nexcent-training-batch-lab
                    ../../gradlew build --stacktrace
                  ) | tee diagnostics/batch-build.log

            - name: Verify patch cleanliness
              run: git diff --check

            - name: Stage reviewed output
              if: always()
              run: |
                  mkdir -p diagnostics/review-fix-output
                  while IFS= read -r path; do
                    mkdir -p "diagnostics/review-fix-output/$(dirname "$path")"
                    cp "$path" "diagnostics/review-fix-output/$path"
                  done <<'EOF'
                  modules/nexcent-training/nexcent-training-article-importer/src/main/java/com/nexcent/training/article/importer/internal/ContentImportJobManagerImpl.java
                  modules/nexcent-training/nexcent-training-service/src/main/java/com/nexcent/training/internal/upgrade/ContentImportUpgradeProcess.java
                  modules/nexcent-training/nexcent-training-article-importer/src/main/java/com/nexcent/training/article/importer/internal/XlsxArticleParser.java
                  modules/nexcent-training/nexcent-training-article-importer/src/test/java/com/nexcent/training/article/importer/internal/XlsxArticleParserTest.java
                  modules/nexcent-training/nexcent-training-article-importer/src/main/java/com/nexcent/training/article/importer/internal/ArticleImportManagerImpl.java
                  modules/nexcent-training/nexcent-training-web/src/main/resources/META-INF/resources/js/index.js
                  modules/nexcent-training/nexcent-training-web/package.json
                  modules/nexcent-training/nexcent-training-web/package-lock.json
                  remote-apps/nexcent-articles/src/index.tsx
                  remote-apps/nexcent-articles/package-lock.json
                  EOF

            - name: Upload reviewed output
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: pr28-review-fix-output
                  path: diagnostics
                  if-no-files-found: error
