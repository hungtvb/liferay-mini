name: Final Submission Check

on:
    push:
        branches:
            - final
            - work/final-submission-foundation
    pull_request:
        branches:
            - final
    workflow_dispatch:

jobs:
    verify-final-submission:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Verify final submission contract
              run: node scripts/verify-final-submission.mjs
